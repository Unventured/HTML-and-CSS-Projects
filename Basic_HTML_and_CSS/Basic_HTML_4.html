<!DOCTYPE html>
<html>
	<body>
		<style>
			.font1{background-color : Black; color : White; size : medium;}
			.font2{background-color : DarkSlateGray; color : DarkMagenta; size : large;}
			.MyStyle {background-color: black; color : red; text-decoration: underline; font-weight: bold; font-size: medium;}
		</style>
		<h2 class="font1">This element is styled with class attribute font1. </h2>
		<h3 class="font2">This element is styled with class attribute font2. </h3>
		<h4 class="font1">Even though this is a different element, it is styled with class attribute font1 like the first one. </h4>
		<p class="MyStyle">This paragraph is styled with class attribute MyStyle. </p>
	</body>
</html>
